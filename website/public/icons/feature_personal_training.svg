    <!-- Trainer -->
    <circle cx="20" cy="16" r="8" fill="#F18A2B" fill-opacity="0.3" stroke="#F18A2B"/>
    <path d="M8 48c0-8 5-14 12-14s12 6 12 14" stroke="#F18A2B"/>
